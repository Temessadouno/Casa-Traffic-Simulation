services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_casa
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express
    container_name: mongo_express_gui
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=pass
    depends_on:
      - mongodb

  backend:
    build: ./backend
    container_name: backend_sim
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    # On privilégie le fichier .env pour garder le docker-compose propre
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /usr/local/lib/python3.10/site-packages


volumes:
  mongo_data: